<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JavaJournal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <style>
        /* Topbar */
        .Topbar {
            display: flex;
            align-items: center;
            background-color: #a5975b;
            color: white;
            border-radius: 3px;
            height: 75px;
            padding: 0 15px;
        }

        .Logo {
            margin-right: 9px;
        }

        #Menu {
            position: absolute;
            right: 0;
            top: 0;
            width: 55px;
            margin-top: 10px;
            margin-right: 10px;
        }

        /* Body */
        body {
            margin: 0;
            font-family: 'Funnel Sans', sans-serif;
        }

        /* Engage container */
        .Engage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* start from top */
            padding-top: 70px; /* space below Topbar */
            min-height: 40vh;
        }

        /* Journal textbox */
        .JournalBox {
            width: 60%;
            max-width: 600px;
            min-width: 400px;
            height: 150px;
            padding: 15px;
            margin-top: 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
            flex-shrink: 0;
            font-family: 'Funnel Sans', sans-serif;
        }

        /* Save button */
        #saveBtn {
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #a5975b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Entries */
        .entry {
            width: 70%;
            max-width: 600px;
            background: #f4f4f4;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
        }

        /* Delete button */
        .entry button {
            margin-top: 8px;
            padding: 5px 10px;
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #Data {
            width: 60%;
            max-width: 800px;
            text-align: center;
        }
        /* Footer */
        footer {
            text-align: center;
            padding: 15px;
        }
        #Initials {
            font-size: 9px;
            color: #a5975b;
        }
    </style>
</head>
<body>

    <!-- Topbar -->
    <div class="Topbar">
        <img src="images/JavaJournalLogo1.png" alt="Logo" class="Logo" width="50px">
        <h1>JavaJournal</h1>
        <img src="images/menus.png" alt="Menu" id="Menu" width="50px">
    </div>

    <!-- Main Engage area -->
    <div class="Engage">
        <h3>JavaJournal, the free and open-source journaling app!</h3>
        <p id="Data">All information is stored loccally on your browser, that means our site remains ad-free and maintains its clarity. Having no backend also allows for a more secure experience!</p>
        <textarea id="journalEntry" class="JournalBox" placeholder="What's on your mind today?"></textarea>
        <button id="saveBtn">Save Entry</button>

        <div id="entriesContainer"></div>
    </div>

    <!-- JavaScript -->
    <script>
        const textbox = document.getElementById("journalEntry");
        const saveBtn = document.getElementById("saveBtn");
        const container = document.getElementById("entriesContainer");

        // Load entries or initialize
        let entries = JSON.parse(localStorage.getItem("journalEntries")) || [];

        // Save to localStorage
        function saveToStorage() {
            localStorage.setItem("journalEntries", JSON.stringify(entries));
        }

        // Display entries
        function displayEntries() {
            container.innerHTML = "";

            entries.forEach((entry, index) => {
                const div = document.createElement("div");
                div.classList.add("entry");

                div.innerHTML = `
                    <strong>${entry.date}</strong><br>
                    ${entry.text}
                    <br><br>
                    <button onclick="deleteEntry(${index})">Delete</button>
                `;

                container.appendChild(div);
            });
        }

        // Delete entry
        function deleteEntry(index) {
            entries.splice(index, 1);
            saveToStorage();
            displayEntries();
        }

        // Save new entry
        saveBtn.addEventListener("click", function() {
            if (textbox.value.trim() === "") return;

            const newEntry = {
                text: textbox.value,
                date: new Date().toLocaleString()
            };

            entries.unshift(newEntry); // newest on top
            saveToStorage();

            textbox.value = "";
            displayEntries();
        });

        // Display on page load
        displayEntries();
    </script>
<footer>
    <p id="footer">Made with ❤️ by Henry Pellar</p> 
    <br>
    <br>
    <p id="Initials">H+K</p>
</footer>
</body>
</html>
